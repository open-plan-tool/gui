volumes:
  open_plan_local_redis_data: {}

services:

  db_pg:
    image: postgres:14.3-alpine
    container_name: open_plan_pg
    env_file:
      - .envs/db.postgres
    expose:
      - 5432

  app_pg: &django
    build:
      context: .
      args:
        BUILD_ENVIRONMENT: local
      dockerfile: ./app/compose/production/app_postgres/Dockerfile
    container_name: django-open_plan_pg
    command: "gunicorn --workers=2 --bind=0.0.0.0:8000 epa.wsgi:application"
    env_file:
      - .envs/epa.postgres
    ports:
      - "8000:8000"
    depends_on:
      - db_pg

  redis:
    image: docker.io/redis:6
    container_name: open_plan_local_redis

    volumes:
      - open_plan_local_redis_data:/data


  celeryworker:
    <<: *django
    image: open_plan_local_celeryworker
    container_name: open_plan_local_celeryworker
    depends_on:
      - redis
      - db_pg
    ports: []
    command: /start-celeryworker

  celerybeat:
    <<: *django
    image: open_plan_local_celerybeat
    container_name: open_plan_local_celerybeat
    depends_on:
      - redis
      - db_pg
    ports: []
    command: /start-celerybeat

  flower:
    <<: *django
    image: open_plan_local_flower
    container_name: open_plan_local_flower
    ports:
      - '5555:5555'
    command: /start-flower

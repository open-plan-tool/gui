name: CI

# Enable Buildkit and let compose use it to speed up image building
env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"

  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"

concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v6

      - name: Build the Stack
        run: docker compose -f docker-compose-ci.yml build app_pg

      - name: Check DB Migrations
        run: docker compose -f docker-compose-ci.yml run --rm app_pg python manage.py makemigrations --check

      - name: Run DB Migrations
        run: docker compose -f docker-compose-ci.yml run --rm app_pg python manage.py migrate

      - name: Run Tests
        run: docker compose -f docker-compose-ci.yml run --rm app_pg python manage.py test

      - name: Tear down the Stack
        if: always()
        run: docker compose -f docker-compose-ci.yml down